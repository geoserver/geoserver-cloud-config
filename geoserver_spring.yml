# Spring Boot application-specific config properties to be shared by all
# GeoServer microservices. Imported from geoserver.yml, in order to separate
# application from geoserver configuration.
server:
  port: 8080
  # Ensures protocol (http vs https) is preserved behind K8s Ingress or Docker Proxies
  forward-headers-strategy: framework
  shutdown: graceful
  tomcat:
    # Maximum number of connections that the server accepts and processes at any given time.
    # Once the limit has been reached, the operating system may still accept connections based on the "acceptCount" property.
    max-connections: ${tomcat.max.connections:8192}
    # Maximum queue length for incoming connection requests when all possible request processing threads are in use.
    accept-count: ${tomcat.accept.count:100}
    accesslog.enabled: ${tomcat.accesslog.enabled:false}
    mbeanregistry.enabled: ${tomcat.mbeanregistry.enabled:false}
    threads:
      # Minimum amount of worker threads.
      min-spare: ${tomcat.threads.min.spare:10}
      # Maximum amount of worker threads.
      max: ${tomcat.threads.max:200}

spring:
  rabbitmq:
    host: ${rabbitmq.host:rabbitmq}
    port: ${rabbitmq.port:5672}
    username: ${rabbitmq.user:guest}
    password: ${rabbitmq.password:guest}
    virtual-host: ${rabbitmq.vhost:}
  cloud:
    bus:
      enabled: true
      id: ${info.instance-id}
      trace.enabled: false #switch on tracing of acks (default off).
    stream:
      bindings:
        springCloudBusOutput:
          destination: geoserver
        springCloudBusInput:
          destination: geoserver
  jackson:
    default-property-inclusion: non-empty
    serialization.indent-output: false #set to true if doing manual testing and want formatted output

management:
  endpoints:
    enabled-by-default: true
    web.exposure.include: "*"
  endpoint:
    env.show-values: ALWAYS
    configprops.show-values: ALWAYS
    info.enabled: true
    metrics.enabled: true
    startup.enabled: true
    shutdown.enabled: true
    health:
      enabled: true
      probes.enabled: true
      show-details: always
  metrics:
    binders:
      processor.enabled: true
      uptime.enabled: true
      jvm.enabled: true
    enable.all: true
    enable.jvm: true
    export:
      atlas.enabled: false
---
spring.config.activate.on-profile: "discovery-consul"
spring:
  cloud:
    consul:
      discovery:
        # Use actuator's health endpoint for Consul
        health-check-path: /actuator/health
        health-check-port: 8081
        health-check-interval: 3s
        # Consul auto-deregisters an instance whose health check stays critical for this long.
        # Acts as a safety net when graceful shutdown fails to deregister the service.
        health-check-critical-timeout: 15s
        prefer-ip-address: true
        instance-id: ${info.instance-id}
