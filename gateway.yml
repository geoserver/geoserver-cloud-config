spring.config.import:
 - optional:geoserver_logging.yml

# Defines the root base path at which the gateway exposes all geoserver request paths
# For example, if geoserver.base-path=/geoserver-cloud, then geoserver requests will be served
# under that path prefix (e.g. http://localhost:9090/geoserver-cloud/web, http://localhost:9090/geoserver-cloud/wfs, etc)
# Examples:
#geoserver.base-path:
#geoserver.base-path: /geoserver
#geoserver.base-path: /geoserver-cloud
#geoserver.base-path: /geoserver/cloud
# Leave it empty for no additional path, setting it to / won't work currently
geoserver:
  base-path: ${geoserver_base_path:}
  security:
    gateway-shared-auth:
       # enable sharing the webui authentication through the gateway with the other microservices
       # make sure the same config is applied in geoserver.yml
       enabled: ${gateway.shared-auth:true}

basepath: ${geoserver.base-path}
# by default, assumes a discovery-client is in use, and perform client-side load balancing on
# the advertised instances. See the 'standalone' profile notes for a static config
targets:
  acl: http://acl:8080
  wfs: lb://wfs
  wms: lb://wms
  wcs: lb://wcs
  wps: lb://wps
  rest: lb://restconfig
  gwc: lb://gwc
  webui: lb://webui
  webui-demo: lb://webui

# Configure routes to services. See https://docs.spring.io/spring-cloud-gateway/reference/spring-cloud-gateway-server-webmvc.html
server:
  port: 8080
  # Let spring-boot's ForwardedHeaderFilter take care of reflecting the client-originated protocol and address in the HttpServletRequest
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types:
      - text/html
      - text/plain
      - text/xml
      - text/css
      - text/javascript
      - application/xml
      - application/json
      - application/geo+json
      - application/gml+xml
      - application/vnd.ogc.wms_xml
      - application/vnd.ogc.se_xml
    min-response-size: 2048

spring:
  threads.virtual.enabled: true
  http:
    clients:
      imperative:
        factory: reactor
      reactive:
        connector: reactor
      connect-timeout: 5s
  cloud:
    gateway:
      actuator:
        verbose:
          enabled: true
      server:
        webmvc:
          # Proxy HTTP client timeouts. Prevents the gateway from hanging indefinitely
          # when a backend service is unreachable (e.g. during container restarts).
          http-client:
            connect-timeout: 5s
            read-timeout: 60s
          # Required: without this, XForwardedRequestHeadersFilter is not created and
          # X-Forwarded-* headers won't be sent to backend services.
          # In production, set to a regex matching actual trusted proxy IPs (e.g. "10\\.0\\.0\\.\\d+").
          trusted-proxies: ".*"
          forwarded-request-headers-filter:
            # Disable the Forwarded header, rely on X-Forwarded-*. Forwarded is built wrong.
            # e.g.:      proto=https;host=\"gateway:8080\";for=\"172.20.0.1:51084\
            # instead of proto=https;host=\"original-host:443\";for=\"172.20.0.1:51084\
            enabled: false
          x-forwarded-request-headers-filter:
            enabled: true
            for-enabled: true
            host-enabled: true
            port-enabled: true
            proto-enabled: true
            prefix-enabled: true
          # Note: WebSocket routing is not supported in Spring Cloud Gateway Server MVC.
          # See https://github.com/spring-cloud/spring-cloud-gateway/issues/3442
          # NOTE: SCG Server MVC does not support default-filters like SCG WebFlux.
          # StripBasePath, SharedAuth, SecureHeaders, and DedupeResponseHeader must be added to each proxy route's filters list.
          # NOTE: SCG Server MVC does not natively support 'filter.secure-headers' (WebFlux-only).
          # Our SecureHeadersProperties bridges the gap, binding the same YAML structure.
          filter:
            secure-headers:
              enabled: true
              disable:
              - content-security-policy
              frame-options: SAMEORIGIN
              xss-protection-header: "0"
              # same-origin: send Referer for same-origin requests only. Required for
              # Wicket's CSRF protection (OriginResourceIsolationPolicy) which uses the
              # Referer header as a fallback when Sec-Fetch-* headers are absent — browsers
              # omit Sec-Fetch-* over plain HTTP to non-localhost hosts.
              referrer-policy: same-origin
          # CORS is configured via 'globalcors' below, bound by our own GlobalCorsProperties.
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins: "*"
                allowedHeaders: "*"
                allowedMethods: GET, PUT, POST, DELETE, OPTIONS, HEAD
          routes:
            - id: root-redirect-to-webui
              uri: no://op
              predicates:
              - Path=/,${basepath}
              filters:
              - RedirectTo=302, ${basepath}/web/
            - id: acl
              uri: ${targets.acl}
              predicates:
              - Path=${basepath}/acl/**
              filters:
              - StripBasePath=${basepath}
              - SecureHeaders
              - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
              - RewritePath=/acl,/acl/
            # WFS routes
            - id: wfs # proxies requests to gateway:/wfs to wfs:/wfs
              uri: ${targets.wfs}
              predicates:
                - Path=${basepath}/wfs,${basepath}/{workspace}/wfs,${basepath}/{workspace}/{layer}/wfs,${basepath}/schemas/wfs/**,${basepath}/webresources/wfs/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            # proxy [/{workspace}]/ows?SERVICE=wfs to wfs:[/{workspace}]/ows?SERVICE=wfs. Param value is case insensitive, name is not.
            - id: wfs_ows
              uri: ${targets.wfs}
              predicates:
                - Path=${basepath}/ows,${basepath}/{workspace}/ows,${basepath}/{workspace}/{layer}/ows
                - RegExpQuery=(?i:service),(?i:wfs) # match service=wfs case insensitively
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            - id: ogcapi-features
              uri: ${targets.wfs}
              predicates:
                - Path=${basepath}/ogc/features/**,${basepath}/{workspace}/ogc/features/**,${basepath}/{workspace}/{layer}/ogc/features/**,${basepath}/webresources/ogcapi/**,${basepath}/apicss/**,${basepath}/swagger-ui/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            # WMS routes
            - id: wms # proxies requests to gateway:/wms to wms:/wms
              uri: ${targets.wms}
              predicates:
                - Path=${basepath}/wms,${basepath}/{workspace}/wms,${basepath}/{workspace}/{layer}/wms,${basepath}/schemas/wms/**,${basepath}/openlayers/**,${basepath}/openlayers3/**,${basepath}/openlayers10/**,${basepath}/webresources/wms/**,${basepath}/options.png
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            - id: wms_ows # proxy [/{workspace}]/ows?SERVICE=wms to wms:[/{workspace}]/ows?SERVICE=wms. Param value is case insensitive, name is not.
              uri: ${targets.wms}
              predicates:
                - Path=${basepath}/ows,${basepath}/{workspace}/ows,${basepath}/{workspace}/{layer}/ows
                - RegExpQuery=(?i:service),(?i:wms) # match service=wms case insensitively
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            - id: kml # proxies requests to kml endpoints to the wms service
              uri: ${targets.wms}
              predicates:
                - Path=${basepath}/wms/kml,${basepath}/{workspace}/wms/kml,${basepath}/kml/icon/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            # WCS routes
            - id: wcs # proxies requests to gateway:/wcs to wcs:/wcs
              uri: ${targets.wcs}
              predicates:
                - Path=${basepath}/wcs,${basepath}/{workspace}/wcs,${basepath}/{workspace}/{layer}/wcs,${basepath}/schemas/wcs/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            - id: wcs_ows # proxy [/{workspace}]/ows?SERVICE=wcs to wcs:[/{workspace}]/ows?SERVICE=wcs. Param value is case insensitive, name is not.
              uri: ${targets.wcs}
              predicates:
                - Path=${basepath}/ows,${basepath}/{workspace}/ows,${basepath}/{workspace}/{layer}/ows
                - RegExpQuery=(?i:service),(?i:wcs) # match service=wcs case insensitively
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            # WPS routes
            - id: wps # proxies requests to gateway:/wps to wfs:/wps
              uri: ${targets.wps}
              predicates:
                - Path=${basepath}/wps,${basepath}/{segment}/wps,${basepath}/schemas/wps/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            - id: wps_ows # proxy [/{workspace}]/ows?SERVICE=wps to wps:[/{workspace}]/ows?SERVICE=wps. Param value is case insensitive, name is not.
              uri: ${targets.wps}
              predicates:
                - Path=${basepath}/ows,${basepath}/{segment}/ows
                - RegExpQuery=(?i:service),(?i:wps) # match service=wps case insensitively
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            # REST configuration routes
            - id: restconfig
              uri: ${targets.rest}
              predicates:
                - Path=${basepath}/rest/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            # GeoWebcache configuration routes
            - id: gwc
              uri: ${targets.gwc}
              predicates:
                - Path=${basepath}/gwc/**,${basepath}/{workspace}/gwc/**,${basepath}/{workspace}/{layer}/gwc/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            # Web UI configuration routes
            - id: webui
              uri: ${targets.webui}
              predicates:
                - Path=${basepath}/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

management:
  server:
    port: 8081
  endpoints:
    access:
      default: read-only
    web:
      exposure:
        include: "*"
  endpoint:
    env.show-values: ALWAYS
    configprops.show-values: ALWAYS
    info:
      access: read-only
    metrics:
      access: read-only
    shutdown:
      access: none
    health:
      access: read-only
      probes:
        enabled: true
      show-details: always
    prometheus:
      access: read-only
  metrics:
    enable:
      jvm: true
---
spring.config.activate.on-profile: "discovery-consul"
spring:
  cloud:
    consul:
      discovery:
        health-check-interval: 3s
        health-check-critical-timeout: 15s
        catalog-services-watch:
          enabled: true
          delay: 1000
---
spring.config.activate.on-profile: standalone
# Define static targets using known host names.
# Host names can be docker-compose assigned service names, or k8s service names as appropriate
targets:
  acl: http://acl:8080
  wfs: http://wfs:8080
  wms: http://wms:8080
  wcs: http://wcs:8080
  wps: http://wps:8080
  rest: http://restconfig:8080
  gwc: http://gwc:8080
  webui: http://webui:8080
---
spring.config.activate.on-profile: debug

logging:
   level:
      root: debug
---
spring.config.activate.on-profile: logging_debug_security
logging:
  level:
    org.geoserver.cloud.security.gateway.sharedauth: debug
---
spring.config.activate.on-profile: local
server.port: 9090
management.server.port: 9090
targets:
  acl: http://localhost:9000
  wfs: http://localhost:9101
  wms: http://localhost:9102
  wcs: http://localhost:9103
  wps: http://localhost:9104
  rest: http://localhost:9105
  webui: http://localhost:9106
  gwc: http://localhost:9107
